      - heading "Cultivated Under 50‑Year‑Old Araucaria Trees in Paraná" [level=2] [ref=e72]
      - paragraph [ref=e73]: grown, not rushed.
      - paragraph [ref=e74]: Our yerba mate grows in the shade of native Araucaria forest — the same landscape our family has worked for over 50 years. Nothing artificial goes into the soil, and nothing about the process has been rushed to fit a faster harvest cycle.
      - paragraph [ref=e75]: "That patience is also why Triunfo holds one of the more complete certification stacks in the category: food safety, environmental stewardship, social responsibility and regional origin, all verified by independent bodies — not self-declared."
      - paragraph [ref=e76]: "For a sourcing team, that also means something practical: one controlled origin, one traceable chain — not a blend of unverified sources."
